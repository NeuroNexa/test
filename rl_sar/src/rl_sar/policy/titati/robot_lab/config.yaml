titati/robot_lab:                                # 工程/机器人配置命名空间
  model_name: "policy.pt"                        # 策略模型文件名（TorchScript JIT）
  num_observations: 57                           # 策略输入维度，需与训练时网络一致
  observations: ["ang_vel", "gravity_vec", "commands", "dof_pos", "dof_vel", "actions"]  
                                                 # 观测项拼接顺序：角速度、重力向量、命令、关节角、关节角速度、上一时刻动作
  observations_history: []                       # 历史观测帧（空表示不使用历史）
  observations_history_priority: "time"          # 历史观测优先策略（time=按时间，term=按任务阶段）
  clip_obs: 100.0                                # 观测值裁剪范围（±100，相当于基本不裁剪）
  clip_actions_lower: [-100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0, -100.0]
                                                 # 动作下界，逐关节限制（±100，相当于基本不裁剪）
  clip_actions_upper: [100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0, 100.0]
                                                 # 动作上界，逐关节限制（±100，相当于基本不裁剪）
  rl_kp: [20.0, 20.0, 20.0, 0.0,
          20.0, 20.0, 20.0, 0.0,
          20.0, 20.0, 20.0, 0.0,
          20.0, 20.0, 20.0, 0.0]
                                                 # RL 模式下各关节的 Kp（刚度），腿部对齐 stiffness=20，脚/轮保持 0 以便速度控制
  rl_kd: [0.5, 0.5, 0.5, 0.5,
          0.5, 0.5, 0.5, 0.5,
          0.5, 0.5, 0.5, 0.5,
          0.5, 0.5, 0.5, 0.5]
                                                 # RL 模式下各关节的 Kd（阻尼），匹配官方 damping=0.5 参数
  fixed_kp: [70.0, 70.0, 70.0,
             70.0, 70.0, 70.0,
             70.0, 70.0, 70.0,
             70.0, 70.0, 70.0,
             0.0, 0.0, 0.0, 0.0]
                                                 # 固定模式下各关节的 Kp，用于站桩/安全控制，更大更硬，脚/轮仍为 0
  fixed_kd: [5.0, 5.0, 5.0,
             5.0, 5.0, 5.0,
             5.0, 5.0, 5.0,
             5.0, 5.0, 5.0,
             0.5, 0.5, 0.5, 0.5]
                                                 # 固定模式下各关节的 Kd，更高阻尼抑制抖动。脚/轮给少量阻尼
  num_of_dofs: 16                                # 关节总数（DOF 数）
  action_scale: [0.125, 0.25, 0.25, 0.25,
                 0.125, 0.25, 0.25, 0.25,
                 0.1875, 0.25, 0.25, 0.25,
                 0.1875, 0.25, 0.25, 0.25]
                                                 # 动作缩放系数：复现 titati_control 中对髋关节额外 0.5/0.75 缩放与 0.25 主尺度
  wheel_indices: [3, 7, 11, 15]                 # 脚/轮关节索引：每条腿的第 4 个关节
  lin_vel_scale: 2.0                             # 线速度命令缩放
  ang_vel_scale: 0.25                            # 角速度命令缩放
  dof_pos_scale: 1.0                             # 关节角观测缩放
  dof_vel_scale: 0.05                            # 关节角速度观测缩放
  commands_scale: [1.0, 1.0, 1.0]                # 命令向量缩放
  torque_limits: [50.0, 55.0, 55.0, 10.0,
                  50.0, 55.0, 55.0, 10.0,
                  50.0, 55.0, 55.0, 10.0,
                  50.0, 55.0, 55.0, 10.0]
                                                 # 力矩上限（Nm），同步官方 RL 设定
  default_dof_pos: [-0.10, 0.90, -1.50, 0.00,
                     0.10, 0.90, -1.50, 0.00,
                    -0.10, -0.90, 1.50, 0.00,
                     0.10, -0.90, 1.50, 0.00]
                                                 # 默认站姿（rad），对齐 titati_control 中 RL 期望
  joint_mapping: [4, 5, 6, 7,
                  0, 1, 2, 3,
                  8, 9, 10, 11,
                  12, 13, 14, 15]
                                                 # 动作/观测数组与物理关节的索引映射，适配硬件 CAN 顺序

/**:
  controller_manager:
    ros__parameters:
      update_rate: 500
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      imu_sensor_broadcaster:
        type: imu_sensor_broadcaster/IMUSensorBroadcaster
      effort_controller:
        type: effort_controllers/JointGroupEffortController

  imu_sensor_broadcaster:
    ros__parameters:
      update_rate: 500
      sensor_name: imu
      frame_id: imu

  joint_state_broadcaster:
    ros__parameters:
      update_rate: 500

  effort_controller:
    ros__parameters:
      joints:
        - FR_hip_joint
        - FR_thigh_joint
        - FR_calf_joint
        - FL_hip_joint
        - FL_thigh_joint
        - FL_calf_joint
        - RR_hip_joint
        - RR_thigh_joint
        - RR_calf_joint
        - RL_hip_joint
        - RL_thigh_joint
        - RL_calf_joint
        - FR_foot_joint
        - FL_foot_joint
        - RR_foot_joint
        - RL_foot_joint
